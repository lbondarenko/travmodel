name: update-model-pages

# Note: GitHub's cron scheduler ignored this workflow on 2026-07-23; file
# re-pushed to re-register the schedule. A local launchd trigger exists as
# belt-and-braces (see PROJECT.md).
on:
  schedule:
    - cron: "3,33 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update
  cancel-in-progress: false

env:
  TZ: Europe/Stockholm

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python src/publish.py

      - name: Commit and push if changed
        run: |
          git config user.name "travmodel-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "auto-update $(date '+%Y-%m-%d %H:%M %Z')"
          git pull --rebase origin main
          git push
